        "Argument : arg(z×z') = arg(z) + arg(z') [2π]",
        "Formule d'Euler : e^(iθ) = cos θ + i sin θ",
        "Formule de Moivre : (cos θ + i sin θ)ⁿ = cos(nθ) + i sin(nθ)"
      ],
      sections: [
        { titre: "Forme algébrique", texte: "<strong>Définition :</strong> i est tel que i² = -1. Un complexe z = a + bi (a,b ∈ ℝ).<br><br><strong>Opérations :</strong><br>• Addition : (a+bi) + (c+di) = (a+c) + (b+d)i<br>• Produit : (a+bi)(c+di) = (ac-bd) + (ad+bc)i<br>• Division : z/z' = (z×z̄') / (z'×z̄') — multiplier par le conjugué du dénominateur<br><br><strong>Conjugué :</strong> z̄ = a - bi<br>• z + z̄ = 2a (partie réelle)<br>• z - z̄ = 2bi (partie imaginaire)<br>• z × z̄ = a² + b² = |z|²<br>• z̄₁ + z̄₂ = z̄₁ + z̄₂<br>• z̄₁ × z̄₂ = z̄₁ × z̄₂" },
        { titre: "Module et argument", texte: "<strong>Module :</strong> |z| = √(a² + b²) = √(z×z̄)<br><br><strong>Propriétés du module :</strong><br>• |z₁×z₂| = |z₁|×|z₂|<br>• |z₁/z₂| = |z₁|/|z₂|<br>• |z̄| = |z|<br>• |zⁿ| = |z|ⁿ<br><br><strong>Argument :</strong> θ = arg(z) tel que cos θ = a/|z| et sin θ = b/|z|<br><br><strong>Propriétés de l'argument :</strong><br>• arg(z₁×z₂) ≡ arg(z₁) + arg(z₂) [2π]<br>• arg(z₁/z₂) ≡ arg(z₁) - arg(z₂) [2π]<br>• arg(z̄) ≡ -arg(z) [2π]<br>• arg(zⁿ) ≡ n×arg(z) [2π]" },
        { titre: "Forme exponentielle et Moivre", texte: "<strong>Formule d'Euler :</strong> e^(iθ) = cos θ + i sin θ<br><br><strong>Forme exponentielle :</strong> z = r×e^(iθ) où r = |z| et θ = arg(z)<br><br><strong>Formule de Moivre :</strong> (e^(iθ))ⁿ = e^(inθ)<br>(cos θ + i sin θ)ⁿ = cos(nθ) + i sin(nθ)<br><br><strong>Valeurs remarquables :</strong><br>• e^(0) = 1<br>• e^(iπ) = -1 (identité d'Euler)<br>• e^(iπ/2) = i<br>• e^(-iπ/2) = -i<br><br><strong>Formule de cos et sin :</strong><br>cos θ = (e^(iθ) + e^(-iθ))/2<br>sin θ = (e^(iθ) - e^(-iθ))/(2i)" }
      ]
    },
    {
      id: "trigo",
      titre: "Trigonométrie",
      points_cles: [
        "cos²x + sin²x = 1  |  1 + tan²x = 1/cos²x",
        "cos(a+b) = cosacosb - sinasinb  |  sin(a+b) = sinacosb + cosasinb",
        "cos(2a) = 2cos²a-1 = 1-2sin²a = cos²a-sin²a",
        "sin(2a) = 2sinacosa",
        "Valeurs clés : sin(π/6)=1/2, sin(π/4)=√2/2, sin(π/3)=√3/2",
        "Dérivée de sin = cos  |  Dérivée de cos = -sin  |  Dérivée de tan = 1/cos²"
      ],
      sections: [
        { titre: "Cercle trigonométrique et valeurs clés", texte: "<strong>Valeurs à connaître :</strong><br><br>| θ | 0 | π/6 | π/4 | π/3 | π/2 |<br>|---|---|---|---|---|---|<br>| cos | 1 | √3/2 | √2/2 | 1/2 | 0 |<br>| sin | 0 | 1/2 | √2/2 | √3/2 | 1 |<br>| tan | 0 | √3/3 | 1 | √3 | — |<br><br><strong>Symétries :</strong><br>• cos(-x) = cos(x) (pair)<br>• sin(-x) = -sin(x) (impair)<br>• cos(π-x) = -cos(x)<br>• sin(π-x) = sin(x)<br>• cos(π+x) = -cos(x)<br>• sin(π/2-x) = cos(x)" },
        { titre: "Formules de trigonométrie", texte: "<strong>Identités fondamentales :</strong><br>• cos²x + sin²x = 1<br>• 1 + tan²x = 1/cos²x<br><br><strong>Formules d'addition :</strong><br>• cos(a+b) = cosacosb - sinasinb<br>• cos(a-b) = cosacosb + sinasinb<br>• sin(a+b) = sinacosb + cosasinb<br>• sin(a-b) = sinacosb - cosasinb<br><br><strong>Formules de duplication :</strong><br>• cos(2a) = cos²a - sin²a = 2cos²a - 1 = 1 - 2sin²a<br>• sin(2a) = 2 sin a cos a<br><br><strong>Formules de linéarisation :</strong><br>• cos²a = (1 + cos2a)/2<br>• sin²a = (1 - cos2a)/2" }
      ]
    }
  ];

  const tabsEl = document.getElementById('tabs');
  const panelsEl = document.getElementById('panels');

  COURS.forEach((c, i) => {
    const btn = document.createElement('button');
    btn.className = 'tab-btn' + (i === 0 ? ' active' : '');
    btn.textContent = c.titre;
    btn.onclick = () => switchTab(c.id);
    tabsEl.appendChild(btn);

    const panel = document.createElement('div');
    panel.id = 'panel-' + c.id;
    panel.className = 'cours-panel' + (i === 0 ? ' active' : '');

    const ptsHtml = c.points_cles.map(p => `<li>${p}</li>`).join('');
    const sectionsHtml = c.sections.map(s => `
      <div class="accordion-item">
        <button class="accordion-btn" onclick="toggleAccordion(this)">
          ${s.titre}<span class="arrow">▼</span>
        </button>
        <div class="accordion-content">${s.texte}</div>
      </div>`).join('');

    panel.innerHTML = `
      <div class="cours-title">${c.titre}</div>
      <div class="points-cles"><h3>Formules clés</h3><ul>${ptsHtml}</ul></div>
      <div class="accordion">${sectionsHtml}</div>`;
    panelsEl.appendChild(panel);
  });

  function switchTab(id) {
    document.querySelectorAll('.tab-btn').forEach((b, i) => b.classList.toggle('active', COURS[i].id === id));
    document.querySelectorAll('.cours-panel').forEach(p => p.classList.toggle('active', p.id === 'panel-' + id));
  }

  function toggleAccordion(btn) {
    const content = btn.nextElementSibling;
    const isOpen = content.classList.contains('open');
    btn.classList.toggle('open', !isOpen);
    content.classList.toggle('open', !isOpen);
  }

  document.querySelector('.accordion-btn').click();
  </script>
</body>
</html>
