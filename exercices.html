  <script>
  const EXERCICES = [
    {
      id: 1,
      titre: "Suite arithmétique — terme général et somme",
      theme: "Suites",
      niveau: "Facile",
      enonce: "La suite (uₙ) est arithmétique de raison r = 3 et de premier terme u₁ = 5.\n1. Exprimer uₙ en fonction de n.\n2. Calculer u₁₀.\n3. Calculer la somme S = u₁ + u₂ + ... + u₁₀.",
      correction: `1. uₙ = u₁ + (n-1)×r = 5 + (n-1)×3 = 5 + 3n - 3 = 3n + 2

2. u₁₀ = 3×10 + 2 = 32

3. Somme de 10 termes consécutifs :
   S = 10 × (u₁ + u₁₀) / 2
   S = 10 × (5 + 32) / 2
   S = 10 × 37 / 2
   S = 185`,
      explication: "Formule terme général : uₙ = u₁ + (n-1)r. Somme arithmétique : n × (premier + dernier)/2."
    },
    {
      id: 2,
      titre: "Suite géométrique — terme général et comportement",
      theme: "Suites",
      niveau: "Facile",
      enonce: "La suite (vₙ) est géométrique de raison q = 1/2 et de premier terme v₀ = 64.\n1. Exprimer vₙ en fonction de n.\n2. Calculer v₅.\n3. Quelle est la limite de vₙ quand n → +∞ ?\n4. Calculer la somme S₆ = v₀ + v₁ + ... + v₅.",
      correction: `1. vₙ = v₀ × qⁿ = 64 × (1/2)ⁿ

2. v₅ = 64 × (1/2)⁵ = 64/32 = 2

3. |q| = 1/2 < 1 donc qⁿ → 0
   Donc lim vₙ = 64 × 0 = 0

4. S₆ = v₀ × (q⁶ - 1)/(q - 1)
   S₆ = 64 × ((1/2)⁶ - 1) / (1/2 - 1)
   S₆ = 64 × (1/64 - 1) / (-1/2)
   S₆ = 64 × (-63/64) / (-1/2)
   S₆ = 64 × (63/64) × 2 = 126`,
      explication: "vₙ = v₀×qⁿ. Si |q| < 1, la suite tend vers 0. Somme géométrique : v₀×(qⁿ-1)/(q-1)."
    },
    {
      id: 3,
      titre: "Étude d'une suite par récurrence",
      theme: "Suites",
      niveau: "Moyen",
      enonce: "On définit la suite (uₙ) par u₀ = 5 et uₙ₊₁ = uₙ/2 + 1.\n1. Calculer u₁, u₂, u₃.\n2. Conjecturer la limite de (uₙ).\n3. Démontrer par récurrence que uₙ ≥ 2 pour tout n ∈ ℕ.\n4. Montrer que (uₙ) est décroissante.\n5. Conclure sur la convergence.",
      correction: `1. u₁ = 5/2 + 1 = 3.5
   u₂ = 3.5/2 + 1 = 2.75
   u₃ = 2.75/2 + 1 = 2.375

2. La suite semble décroître vers 2.

3. Récurrence : Montrons que uₙ ≥ 2 pour tout n.
   • Initialisation : u₀ = 5 ≥ 2 ✓
   • Hérédité : Supposons uₙ ≥ 2.
     Alors uₙ₊₁ = uₙ/2 + 1 ≥ 2/2 + 1 = 2 ✓
   Donc uₙ ≥ 2 pour tout n ∈ ℕ.

4. uₙ₊₁ - uₙ = (uₙ/2 + 1) - uₙ = -uₙ/2 + 1 = (2 - uₙ)/2
   Comme uₙ ≥ 2, on a 2 - uₙ ≤ 0 donc uₙ₊₁ - uₙ ≤ 0.
   La suite est décroissante.

5. (uₙ) est décroissante et minorée par 2
   → Par le théorème des suites monotones, elle converge.
   Soit ℓ sa limite. En passant à la limite : ℓ = ℓ/2 + 1 → ℓ = 2.`,
      explication: "Méthode type bac : récurrence pour minoration, signe de uₙ₊₁-uₙ pour monotonie, puis théorème de convergence."
    },
    {
      id: 4,
      titre: "Dérivée et tableau de variations",
      theme: "Dérivation",
      niveau: "Facile",
      enonce: "Soit f(x) = x³ - 3x² + 1 définie sur ℝ.\n1. Calculer f'(x).\n2. Résoudre f'(x) = 0.\n3. Dresser le tableau de variations de f.\n4. En déduire les extremums locaux.",
      correction: `1. f'(x) = 3x² - 6x = 3x(x - 2)

2. f'(x) = 0 ⟺ 3x(x-2) = 0 ⟺ x = 0 ou x = 2

3. Signe de f'(x) = 3x(x-2) :
   • x < 0 : (−)(−) = + → f' > 0
   • 0 < x < 2 : (+)(−) = − → f' < 0
   • x > 2 : (+)(+) = + → f' > 0

   Tableau de variations :
   x    | -∞      0        2      +∞
   f'   |    +  0  -   0   +
   f    |   ↗   1  ↘  -3  ↗

   f(0) = 0 - 0 + 1 = 1
   f(2) = 8 - 12 + 1 = -3

4. Maximum local en x = 0 : f(0) = 1
   Minimum local en x = 2 : f(2) = -3`,
      explication: "f'(x) = 0 donne les candidats aux extremums. Le signe de f' donne le sens de variation, et le changement de signe donne le type d'extremum."
    },
    {
      id: 5,
      titre: "Dérivée d'une composée et équation de tangente",
      theme: "Dérivation",
      niveau: "Moyen",
      enonce: "Soit f(x) = e^(2x-1) définie sur ℝ.\n1. Calculer f'(x).\n2. Calculer f(1) et f'(1).\n3. En déduire l'équation de la tangente à la courbe de f au point d'abscisse x = 1.",
      correction: `1. f(x) = e^u avec u = 2x-1
   u' = 2
   f'(x) = u' × e^u = 2e^(2x-1)

2. f(1) = e^(2×1-1) = e^1 = e ≈ 2.718
   f'(1) = 2e^(2-1) = 2e

3. Équation de la tangente en x₀ = 1 :
   y = f'(1)(x - 1) + f(1)
   y = 2e(x - 1) + e
   y = 2ex - 2e + e
   y = 2ex - e
   y = e(2x - 1)`,
      explication: "Tangente en x₀ : y = f'(x₀)(x-x₀) + f(x₀). Pour une composée e^u : (e^u)' = u'×e^u."
    },
    {
      id: 6,
      titre: "Calcul d'intégrales",
      theme: "Intégration",
      niveau: "Facile",
      enonce: "Calculer les intégrales suivantes :\n1. ∫₀² (3x² + 2x - 1) dx\n2. ∫₁ᵉ (1/x) dx\n3. ∫₀^(π/2) cos(x) dx",
      correction: `1. Primitive de 3x²+2x-1 : F(x) = x³ + x² - x
   ∫₀² (3x²+2x-1)dx = F(2) - F(0)
   = (8 + 4 - 2) - (0 + 0 - 0) = 10

2. Primitive de 1/x : F(x) = ln(x) (pour x > 0)
   ∫₁ᵉ (1/x)dx = [ln(x)]₁ᵉ = ln(e) - ln(1) = 1 - 0 = 1

3. Primitive de cos(x) : F(x) = sin(x)
   ∫₀^(π/2) cos(x)dx = [sin(x)]₀^(π/2)
   = sin(π/2) - sin(0) = 1 - 0 = 1`,
      explication: "Théorème fondamental : ∫ₐᵇ f = F(b)-F(a). Savoir les primitives de base : xⁿ → xⁿ⁺¹/(n+1), 1/x → ln x, cos → sin."
    },
    {
      id: 7,
      titre: "Aire entre deux courbes",
      theme: "Intégration",
      niveau: "Moyen",
      enonce: "Soit f(x) = x² et g(x) = x définie sur [0, 1].\n1. Montrer que g(x) ≥ f(x) sur [0, 1].\n2. Calculer l'aire de la région comprise entre les deux courbes sur [0, 1].",
      correction: `1. g(x) - f(x) = x - x² = x(1-x)
   Sur [0,1] : x ≥ 0 et (1-x) ≥ 0
   Donc g(x) - f(x) ≥ 0, c'est-à-dire g(x) ≥ f(x) sur [0,1].

2. A = ∫₀¹ (g(x) - f(x)) dx
   A = ∫₀¹ (x - x²) dx
   A = [x²/2 - x³/3]₀¹
   A = (1/2 - 1/3) - (0 - 0)
   A = 3/6 - 2/6 = 1/6

   L'aire vaut 1/6 unité d'aire (u.a.)`,
      explication: "Aire entre deux courbes (avec f≥g) : A = ∫ₐᵇ (f(x)-g(x))dx. Toujours vérifier le signe avant d'intégrer."
    },
    {
      id: 8,
      titre: "Équations avec logarithme et exponentielle",
      theme: "Dérivation",
      niveau: "Facile",
      enonce: "Résoudre les équations suivantes dans ℝ :\n1. e^(2x-3) = 5\n2. ln(x+1) = 3\n3. 2×ln(x) - ln(x²-1) = 0 (pour x > 1)",
      correction: `1. e^(2x-3) = 5
   ⟺ 2x - 3 = ln(5)
   ⟺ 2x = 3 + ln(5)
   ⟺ x = (3 + ln(5))/2

2. ln(x+1) = 3
   ⟺ x + 1 = e³
   ⟺ x = e³ - 1

3. 2ln(x) - ln(x²-1) = 0
   ⟺ ln(x²) - ln(x²-1) = 0
   ⟺ ln(x²/(x²-1)) = 0
   ⟺ x²/(x²-1) = 1
   ⟺ x² = x² - 1
   ⟺ 0 = -1 → impossible
   Aucune solution (pour x > 1).`,
      explication: "eˣ = a ⟺ x = ln(a). ln(x) = b ⟺ x = eᵇ. Utiliser les propriétés : 2ln(x) = ln(x²), ln(a) - ln(b) = ln(a/b)."
    },
    {
      id: 9,
      titre: "Loi binomiale — calcul de probabilités",
      theme: "Probabilités",
      niveau: "Moyen",
      enonce: "Un QCM comporte 10 questions avec 4 réponses possibles chacune (une seule bonne réponse). Un élève répond au hasard à toutes les questions.\n1. Quelle loi suit X (nombre de bonnes réponses) ?\n2. Calculer P(X = 3).\n3. Calculer P(X ≥ 1).\n4. Calculer E(X) et σ(X).",
      correction: `1. Chaque question : p = 1/4 de succès, n = 10 essais indépendants.
   X suit la loi binomiale B(10, 1/4).

2. P(X = 3) = C(10,3) × (1/4)³ × (3/4)⁷
   C(10,3) = 120
   P(X = 3) = 120 × (1/64) × (3⁷/4⁷)
   3⁷ = 2187 et 4⁷ = 16384
   P(X = 3) = 120 × 2187 / (64 × 16384)
   P(X = 3) ≈ 0.250 (25%)

3. P(X ≥ 1) = 1 - P(X = 0)
   P(X = 0) = (3/4)¹⁰ ≈ 0.0563
   P(X ≥ 1) = 1 - 0.0563 ≈ 0.944 (94.4%)

4. E(X) = np = 10 × 1/4 = 2.5
   V(X) = np(1-p) = 10 × (1/4) × (3/4) = 1.875
   σ(X) = √1.875 ≈ 1.37`,
      explication: "Loi binomiale B(n,p) : n essais indépendants, même probabilité p. E(X)=np, V(X)=np(1-p). P(X≥1) = 1 - P(X=0) est souvent plus simple."
    },
    {
      id: 10,
      titre: "Probabilités conditionnelles et formule de Bayes",
      theme: "Probabilités",
      niveau: "Difficile",
      enonce: "Une urne A contient 3 rouges et 2 noires. Une urne B contient 1 rouge et 4 noires. On tire une urne au hasard (équiprobable), puis on tire une bille.\n1. Calculer P(Rouge).\n2. Sachant que la bille est rouge, quelle est la probabilité qu'elle vienne de l'urne A ?",
      correction: `Notons A : « choisir l'urne A » et R : « tirer une bille rouge ».

P(A) = P(B) = 1/2
P(R|A) = 3/5 (3 rouges sur 5 dans l'urne A)
P(R|B_urne) = 1/5 (1 rouge sur 5 dans l'urne B)

1. Formule des probabilités totales :
   P(R) = P(A)×P(R|A) + P(B_urne)×P(R|B_urne)
   P(R) = (1/2)×(3/5) + (1/2)×(1/5)
   P(R) = 3/10 + 1/10 = 4/10 = 2/5

2. Formule de Bayes :
   P(A|R) = P(A)×P(R|A) / P(R)
   P(A|R) = (1/2 × 3/5) / (2/5)
   P(A|R) = (3/10) / (4/10)
   P(A|R) = 3/4`,
      explication: "Formule des probabilités totales puis Bayes. Bien identifier la partition (A et B_urne), les probabilités conditionnelles, puis appliquer les formules."
    },
    {
      id: 11,
      titre: "Nombres complexes — calculs et forme algébrique",
      theme: "Complexes",
      niveau: "Facile",
      enonce: "Soit z₁ = 2 + 3i et z₂ = 1 - i.\n1. Calculer z₁ + z₂, z₁ × z₂ et z₁/z₂.\n2. Calculer |z₁| et arg(z₂) (en radians).\n3. Vérifier que z₁ × z̄₁ = |z₁|².",
      correction: `1. z₁ + z₂ = (2+1) + (3-1)i = 3 + 2i

   z₁ × z₂ = (2+3i)(1-i)
   = 2×1 + 2×(-i) + 3i×1 + 3i×(-i)
   = 2 - 2i + 3i - 3i²
   = 2 + i - 3×(-1) = 2 + i + 3 = 5 + i

   z₁/z₂ = z₁ × z̄₂ / (z₂ × z̄₂)
   z̄₂ = 1 + i,  z₂×z̄₂ = 1+1 = 2
   z₁ × z̄₂ = (2+3i)(1+i) = 2+2i+3i+3i² = 2+5i-3 = -1+5i
   z₁/z₂ = (-1+5i)/2 = -1/2 + (5/2)i

2. |z₁| = √(2²+3²) = √13

   z₂ = 1 - i = √2 × (1/√2 - i/√2) = √2 × (cos(-π/4) + i sin(-π/4))
   arg(z₂) = -π/4

3. z̄₁ = 2 - 3i
   z₁ × z̄₁ = (2+3i)(2-3i) = 4-9i² = 4+9 = 13 = (√13)² = |z₁|² ✓`,
      explication: "Division : multiplier numérateur et dénominateur par le conjugué du dénominateur. Module : √(a²+b²). Propriété : z×z̄ = |z|²."
    },
    {
      id: 12,
      titre: "Forme exponentielle et formule de Moivre",
      theme: "Complexes",
      niveau: "Difficile",
      enonce: "1. Mettre z = 1 + i en forme exponentielle.\n2. En déduire z⁸.\n3. En utilisant la formule de Moivre, exprimer cos(3θ) en fonction de cos(θ).",
      correction: `1. |z| = √(1²+1²) = √2
   arg(z) = π/4 (cos = 1/√2 = sin)
   z = √2 × e^(iπ/4)

2. z⁸ = (√2)⁸ × e^(i×8×π/4) = 2⁴ × e^(2iπ) = 16 × 1 = 16
   Vérification : z² = (1+i)² = 1+2i-1 = 2i
   z⁴ = (2i)² = -4
   z⁸ = (-4)² = 16 ✓

3. (cosθ + i sinθ)³ = cos(3θ) + i sin(3θ) [Moivre]

   Développer (cosθ + i sinθ)³ :
   = cos³θ + 3cos²θ×(isinθ) + 3cosθ×(isinθ)² + (isinθ)³
   = cos³θ + 3i cos²θ sinθ - 3cosθ sin²θ - i sin³θ

   Partie réelle = cos(3θ) :
   cos(3θ) = cos³θ - 3cosθ sin²θ
   = cos³θ - 3cosθ(1-cos²θ)
   cos(3θ) = 4cos³θ - 3cosθ`,
      explication: "Forme exponentielle : z = |z|e^(iθ). Puissances : (re^(iθ))ⁿ = rⁿe^(inθ). Moivre permet de linéariser sin et cos."
    },
    {
      id: 13,
      titre: "Vecteur normal et équation de plan",
      theme: "Géométrie",
      niveau: "Moyen",
      enonce: "Dans l'espace muni d'un repère orthonormal. On donne les points A(1,0,2), B(3,1,1) et C(0,2,3).\n1. Calculer AB⃗ et AC⃗.\n2. Vérifier que n⃗(1,-1,-2) est un vecteur normal au plan (ABC).\n3. Écrire l'équation cartésienne du plan (ABC).\n4. Calculer la distance du point D(4,0,0) au plan (ABC).",
      correction: `1. AB⃗ = B - A = (3-1, 1-0, 1-2) = (2, 1, -1)
   AC⃗ = C - A = (0-1, 2-0, 3-2) = (-1, 2, 1)

2. Vérifier n⃗·AB⃗ = 0 et n⃗·AC⃗ = 0 :
   n⃗·AB⃗ = 1×2 + (-1)×1 + (-2)×(-1) = 2 - 1 + 2 = 3 ≠ 0

   Recalculons le vrai vecteur normal (produit vectoriel) :
   n⃗ = AB⃗ × AC⃗
   nₓ = (1×1 - (-1)×2) = 1+2 = 3
   nᵧ = ((-1)×(-1) - 2×1) = 1-2 = -1
   n_z = (2×2 - 1×(-1)) = 4+1 = 5
   n⃗ = (3, -1, 5)

   Vérification : n⃗·AB⃗ = 6-1-5 = 0 ✓  n⃗·AC⃗ = -3-2+5 = 0 ✓

3. Plan passant par A(1,0,2), normal n⃗(3,-1,5) :
   3(x-1) - 1(y-0) + 5(z-2) = 0
   3x - 3 - y + 5z - 10 = 0
   3x - y + 5z = 13

4. Distance de D(4,0,0) au plan 3x - y + 5z - 13 = 0 :
   d = |3×4 - 1×0 + 5×0 - 13| / √(9+1+25)
   d = |12 - 13| / √35
   d = 1/√35 = √35/35 ≈ 0.169`,
      explication: "Vecteur normal : perpendiculaire à tous les vecteurs du plan (produit scalaire nul). Équation du plan : n⃗·AM⃗ = 0. Distance point-plan : |ax₀+by₀+cz₀+d|/√(a²+b²+c²)."
    },
    {
      id: 14,
      titre: "Produit scalaire et orthogonalité",
      theme: "Géométrie",
      niveau: "Facile",
      enonce: "Dans un repère orthonormal de l'espace, on considère u⃗(2,-1,3) et v⃗(1,4,a).\n1. Calculer u⃗·v⃗ en fonction de a.\n2. Déterminer a pour que u⃗ et v⃗ soient orthogonaux.\n3. Calculer ||u⃗||.",
      correction: `1. u⃗·v⃗ = 2×1 + (-1)×4 + 3×a
   u⃗·v⃗ = 2 - 4 + 3a = 3a - 2

2. u⃗ ⊥ v⃗ ⟺ u⃗·v⃗ = 0
   3a - 2 = 0
   a = 2/3

3. ||u⃗|| = √(2² + (-1)² + 3²)
   = √(4 + 1 + 9)
   = √14`,
      explication: "Produit scalaire analytique : ad+be+cf. Orthogonalité ⟺ produit scalaire = 0. Norme : √(a²+b²+c²)."
    },
    {
      id: 15,
      titre: "Primitives et intégration par parties",
      theme: "Intégration",
      niveau: "Difficile",
      enonce: "Calculer I = ∫₀¹ x×eˣ dx en utilisant l'intégration par parties.",
      correction: `Intégration par parties : ∫ u×v' = [u×v] - ∫ u'×v

Choix :
  u = x     → u' = 1
  v' = eˣ   → v = eˣ

Application :
  I = [x×eˣ]₀¹ - ∫₀¹ 1×eˣ dx
  I = (1×e¹ - 0×e⁰) - [eˣ]₀¹
  I = e - 0 - (e¹ - e⁰)
  I = e - (e - 1)
  I = e - e + 1
  I = 1`,
      explication: "IPP : choisir u comme la fonction qu'on dérive facilement, v' comme celle qu'on intègre facilement. Mnémotechnique 'ALPES' : Arctan, Log, Puissance, Expo, Sin/cos → choisir u dans cet ordre."
    }
  ];

  let filtreNiveau = 'Tous';
  let filtreTheme = 'Tous';

  function setFilter(btn, type) {
    const val = btn.dataset[type];
    if (type === 'niveau') {
      filtreNiveau = val;
      document.querySelectorAll('[data-niveau]').forEach(b => b.classList.toggle('active', b.dataset.niveau === val));
    } else {
      filtreTheme = val;
      document.querySelectorAll('[data-theme]').forEach(b => b.classList.toggle('active', b.dataset.theme === val));
    }
    renderExos();
  }

  function renderExos() {
    const list = document.getElementById('exo-list');
    const filtered = EXERCICES.filter(e =>
      (filtreNiveau === 'Tous' || e.niveau === filtreNiveau) &&
      (filtreTheme === 'Tous' || e.theme === filtreTheme)
    );

    if (filtered.length === 0) {
      list.innerHTML = '<p style="color:var(--muted);text-align:center;padding:2rem">Aucun exercice pour ces filtres.</p>';
      return;
    }

    list.innerHTML = filtered.map(e => {
      const badgeClass = e.niveau === 'Facile' ? 'badge-facile' : e.niveau === 'Moyen' ? 'badge-moyen' : 'badge-difficile';
      return `
        <div class="exo-card">
          <div class="exo-header">
            <div class="exo-title">${e.titre}</div>
            <span class="badge ${badgeClass}">${e.niveau}</span>
          </div>
          <div class="exo-meta">${e.theme}</div>
          <div class="exo-enonce">${escNl(e.enonce)}</div>
          <button class="toggle-correction" onclick="toggleCorrection(this)">Voir la correction</button>
          <div class="correction-wrap">
            <div class="math-block">${esc(e.correction)}</div>
            <div class="explication">${e.explication}</div>
          </div>
        </div>`;
    }).join('');
  }

  function esc(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function escNl(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
  }

  function toggleCorrection(btn) {
    const wrap = btn.nextElementSibling;
    const isOpen = wrap.classList.contains('show');
    wrap.classList.toggle('show', !isOpen);
    btn.textContent = isOpen ? 'Voir la correction' : 'Masquer la correction';
  }

  renderExos();
  </script>
</body>
</html>
