<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QCM Maths</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <nav>
    <a class="nav-logo" href="index.html">Révision Maths</a>
    <div class="nav-links">
      <a href="index.html">Accueil</a>
      <a href="quiz.html" class="active">Quiz</a>
      <a href="cours.html">Cours</a>
      <a href="exercices.html">Exercices</a>
    </div>
  </nav>

  <div class="container">
    <div class="quiz-wrap">
      <div id="start-screen" style="text-align:center;padding:3rem 1rem">
        <div style="font-size:3rem;margin-bottom:1rem">📐</div>
        <h1 style="font-size:1.8rem;font-weight:700;margin-bottom:0.75rem">QCM Maths Terminale</h1>
        <p style="color:var(--muted);max-width:440px;margin:0 auto 2rem">20 questions tirées aléatoirement parmi 100. Formules, théorèmes, calculs — testez-vous sur tout le programme.</p>
        <button class="btn" onclick="startQuiz()">Commencer le QCM</button>
      </div>

      <div id="quiz-screen" style="display:none">
        <div class="quiz-header">
          <span id="q-counter" style="color:var(--muted);font-size:0.9rem">Question 1 / 20</span>
          <span id="score-live" style="color:var(--primary-light);font-size:0.9rem;font-weight:600">Score : 0</span>
        </div>
        <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:5%"></div></div>
        <div class="question-card">
          <div class="theme-badge" id="q-theme"></div>
          <div class="question-num" id="q-num"></div>
          <div class="question-text" id="q-text"></div>
          <div class="options" id="options"></div>
          <div class="explanation" id="explanation"></div>
        </div>
        <div class="quiz-nav">
          <button class="btn" id="next-btn" onclick="nextQuestion()" style="display:none">Question suivante →</button>
        </div>
      </div>

      <div id="result-screen" style="display:none">
        <div class="score-card">
          <div class="score-num" id="final-score"></div>
          <div class="score-label">points sur 20</div>
          <div class="score-msg" id="score-msg"></div>
          <p id="score-detail" style="color:var(--muted);font-size:0.9rem;margin-top:0.5rem"></p>
          <div class="score-actions">
            <button class="btn" onclick="startQuiz()">Rejouer</button>
            <a class="btn btn-outline" href="cours.html">Revoir les formules</a>
          </div>
        </div>
      </div>
    </div>
  </div>

  <footer>Révision Maths Terminale</footer>

  <script>
  const ALL_QUESTIONS = [
    // === SUITES NUMÉRIQUES ===
    { id:1, theme:"Suites", question:"Une suite (uₙ) est arithmétique de raison r. Quelle est l'expression de uₙ en fonction de u₀ ?", options:["uₙ = u₀ × rⁿ","uₙ = u₀ + n×r","uₙ = u₀ × n + r","uₙ = r + (n-1)×u₀"], correctAnswer:1, explanation:"Suite arithmétique : uₙ = u₀ + n×r. La raison r est la différence constante entre deux termes consécutifs." },
    { id:2, theme:"Suites", question:"Une suite géométrique de raison q et de premier terme u₀. La somme u₀ + u₁ + ... + uₙ₋₁ est égale à :", options:["u₀ × (qⁿ - 1) / (q - 1) si q ≠ 1","u₀ × n × q","u₀ × qⁿ / (q-1)","n × u₀ × q"], correctAnswer:0, explanation:"Somme géométrique : S = u₀ × (qⁿ - 1)/(q - 1) pour q ≠ 1. Pour q = 1 : S = n × u₀." },
    { id:3, theme:"Suites", question:"Une suite (uₙ) est monotone croissante si et seulement si :", options:["uₙ > 0 pour tout n","uₙ₊₁ - uₙ > 0 pour tout n","uₙ₊₁ / uₙ > 1 pour tout n","uₙ₊₁ - uₙ ≥ 0 pour tout n"], correctAnswer:3, explanation:"Une suite est (non strictement) croissante si uₙ₊₁ - uₙ ≥ 0 pour tout n. Pour une croissance stricte : uₙ₊₁ - uₙ > 0." },
    { id:4, theme:"Suites", question:"Si une suite est croissante et majorée, alors :", options:["Elle diverge vers +∞","Elle est constante","Elle converge","Elle oscille"], correctAnswer:2, explanation:"Théorème de la limite monotone : toute suite monotone et bornée est convergente." },
    { id:5, theme:"Suites", question:"La suite uₙ = 3n + 1 est :", options:["Géométrique de raison 3","Arithmétique de raison 3","Géométrique de raison 1","Ni arithmétique ni géométrique"], correctAnswer:1, explanation:"uₙ₊₁ - uₙ = 3(n+1)+1 - (3n+1) = 3. La différence est constante égale à 3 : suite arithmétique de raison r = 3." },
    { id:6, theme:"Suites", question:"La suite uₙ = 2ⁿ est :", options:["Arithmétique de raison 2","Géométrique de raison 2","Arithmétique de raison 1","Ni arithmétique ni géométrique"], correctAnswer:1, explanation:"uₙ₊₁ / uₙ = 2ⁿ⁺¹ / 2ⁿ = 2. Le rapport est constant égal à 2 : suite géométrique de raison q = 2." },
    { id:7, theme:"Suites", question:"Pour une suite arithmétique, la somme des n premiers termes S = u₁ + u₂ + ... + uₙ est égale à :", options:["n × u₁","n × (u₁ + uₙ) / 2","n × (u₁ + uₙ)","(u₁ + uₙ) / 2"], correctAnswer:1, explanation:"S = n × (premier terme + dernier terme) / 2 = n × (u₁ + uₙ)/2. Formule de la somme arithmétique." },
    { id:8, theme:"Suites", question:"Une suite géométrique de raison |q| < 1 converge vers :", options:["1","0","+∞","Elle diverge"], correctAnswer:1, explanation:"Si |q| < 1, alors qⁿ → 0 quand n → +∞, donc une suite géométrique de raison |q| < 1 converge vers 0." },

    // === LIMITES ===
    { id:9, theme:"Limites", question:"lim(x→+∞) eˣ/xⁿ (pour n entier positif) est égale à :", options:["0","1","n!","+∞"], correctAnswer:3, explanation:"L'exponentielle croît plus vite que tout polynôme : eˣ/xⁿ → +∞. On dit que eˣ domine xⁿ." },
    { id:10, theme:"Limites", question:"lim(x→+∞) ln(x)/x est égale à :", options:["+∞","1","0","ln(1)=0"], correctAnswer:2, explanation:"Le logarithme croît moins vite que la fonction identité : ln(x)/x → 0 quand x → +∞." },
    { id:11, theme:"Limites", question:"lim(x→0⁺) x×ln(x) est égale à :", options:["0","-∞","+∞","1"], correctAnswer:0, explanation:"Limite classique : x×ln(x) → 0 quand x → 0⁺. La puissance de x l'emporte sur le ln(x)." },
    { id:12, theme:"Limites", question:"lim(x→+∞) (1 + 1/x)ˣ est égale à :", options:["1","2","e","+∞"], correctAnswer:2, explanation:"C'est la définition du nombre e : lim(x→+∞) (1 + 1/x)ˣ = e ≈ 2.718..." },
    { id:13, theme:"Limites", question:"Si lim(x→a) f(x) = +∞ et lim(x→a) g(x) = L > 0, alors lim(x→a) f(x)×g(x) est :", options:["0","L","+∞","Indéterminée"], correctAnswer:2, explanation:"Si f(x) → +∞ et g(x) → L > 0, alors f(x)×g(x) → +∞. Pas de forme indéterminée ici." },
    { id:14, theme:"Limites", question:"La forme ∞ - ∞ est :", options:["Toujours égale à 0","Toujours égale à +∞","Une forme indéterminée","Toujours infinie"], correctAnswer:2, explanation:"∞ - ∞ est une forme indéterminée : le résultat dépend des fonctions considérées. Il faut lever l'indétermination." },

    // === DÉRIVATION ===
    { id:15, theme:"Dérivation", question:"La dérivée de f(x) = xⁿ (n entier) est :", options:["xⁿ⁻¹","n×xⁿ⁻¹","n×xⁿ","(n-1)×xⁿ⁻¹"], correctAnswer:1, explanation:"(xⁿ)' = n×xⁿ⁻¹. Règle de dérivation des puissances." },
    { id:16, theme:"Dérivation", question:"La dérivée de f(x) = ln(x) est :", options:["1/x²","ln(x)/x","1/x","x×ln(x)"], correctAnswer:2, explanation:"(ln x)' = 1/x pour x > 0. Formule fondamentale à connaître absolument." },
    { id:17, theme:"Dérivation", question:"La dérivée de f(x) = eˣ est :", options:["x×eˣ⁻¹","eˣ","e×eˣ","eˣ/x"], correctAnswer:1, explanation:"(eˣ)' = eˣ. La fonction exponentielle est égale à sa propre dérivée, propriété remarquable." },
    { id:18, theme:"Dérivation", question:"La dérivée de f(x) = sin(x) est :", options:["cos(x)","-cos(x)","sin(x)","-sin(x)"], correctAnswer:0, explanation:"(sin x)' = cos x. À retenir : (cos x)' = -sin x." },
    { id:19, theme:"Dérivation", question:"La dérivée du produit u×v est :", options:["u'×v'","u'×v + u×v'","u'×v - u×v'","(u'×v)/(u×v')"], correctAnswer:1, explanation:"Règle du produit : (u×v)' = u'×v + u×v'. Formule fondamentale." },
    { id:20, theme:"Dérivation", question:"La dérivée de f(x) = u(v(x)) (composition) est :", options:["u'(x)×v'(x)","u'(v(x))×v'(x)","u(v'(x))","u'(v(x)) + v'(x)"], correctAnswer:1, explanation:"Règle de la chaîne (composition) : (u∘v)'(x) = u'(v(x)) × v'(x)." },
    { id:21, theme:"Dérivation", question:"Si f'(x) > 0 sur un intervalle I, alors f est :", options:["Décroissante sur I","Constante sur I","Croissante sur I","Convexe sur I"], correctAnswer:2, explanation:"Si f' > 0 sur I, alors f est strictement croissante sur I. Si f' < 0, f est décroissante." },
    { id:22, theme:"Dérivation", question:"La dérivée de f(x) = √x est :", options:["1/(2√x)","2√x","√x/2","1/√x"], correctAnswer:0, explanation:"(√x)' = (x^(1/2))' = (1/2)×x^(-1/2) = 1/(2√x)." },
    { id:23, theme:"Dérivation", question:"La dérivée de f(x) = 1/x est :", options:["ln(x)","-1/x²","1/x²","-ln(x)"], correctAnswer:1, explanation:"(1/x)' = (x⁻¹)' = -x⁻² = -1/x²." },
    { id:24, theme:"Dérivation", question:"La dérivée du quotient u/v est :", options:["u'/v'","(u'v - uv')/v²","(u'v + uv')/v²","u'v'/v²"], correctAnswer:1, explanation:"Règle du quotient : (u/v)' = (u'v - uv')/v². Le signe moins est au numérateur." },

    // === INTÉGRATION ===
    { id:25, theme:"Intégration", question:"Une primitive de f(x) = xⁿ (n ≠ -1) est :", options:["n×xⁿ⁻¹","xⁿ⁺¹","xⁿ⁺¹/(n+1)","xⁿ/n"], correctAnswer:2, explanation:"Primitive de xⁿ : F(x) = xⁿ⁺¹/(n+1) + C. On divise par (n+1) après avoir augmenté l'exposant de 1." },
    { id:26, theme:"Intégration", question:"Une primitive de f(x) = eˣ est :", options:["eˣ/x","x×eˣ","eˣ","e×eˣ⁻¹"], correctAnswer:2, explanation:"La primitive de eˣ est eˣ (à une constante près), puisque (eˣ)' = eˣ." },
    { id:27, theme:"Intégration", question:"Une primitive de f(x) = 1/x (x > 0) est :", options:["1/x²","-1/x²","ln(x)","x×ln(x) - x"], correctAnswer:2, explanation:"La primitive de 1/x est ln|x| (pour x > 0, c'est ln(x))." },
    { id:28, theme:"Intégration", question:"L'intégrale ∫₀¹ x² dx est égale à :", options:["1","1/2","1/3","2/3"], correctAnswer:2, explanation:"∫₀¹ x² dx = [x³/3]₀¹ = 1/3 - 0 = 1/3." },
    { id:29, theme:"Intégration", question:"Si f est continue et positive sur [a,b], alors ∫ₐᵇ f(x) dx représente :", options:["La pente de f entre a et b","L'aire sous la courbe de f entre a et b","La valeur maximale de f","La valeur moyenne de f"], correctAnswer:1, explanation:"L'intégrale d'une fonction positive représente l'aire entre la courbe et l'axe des abscisses." },
    { id:30, theme:"Intégration", question:"La valeur moyenne de f sur [a,b] est :", options:["∫ₐᵇ f(x) dx","(f(a)+f(b))/2","1/(b-a) × ∫ₐᵇ f(x) dx","f((a+b)/2)"], correctAnswer:2, explanation:"Valeur moyenne : μ = 1/(b-a) × ∫ₐᵇ f(x) dx. On divise l'intégrale par la longueur de l'intervalle." },
    { id:31, theme:"Intégration", question:"La primitive de sin(x) est :", options:["cos(x)","-cos(x)","sin(x) + cos(x)","-sin(x)"], correctAnswer:1, explanation:"La primitive de sin(x) est -cos(x), puisque (-cos x)' = sin x." },
    { id:32, theme:"Intégration", question:"Pour calculer ∫ₐᵇ f(x) dx, on utilise :", options:["F(a) - F(b) où F est une primitive","F(b) - F(a) où F est une primitive","f(b) - f(a)","(f(a) + f(b)) × (b-a)"], correctAnswer:1, explanation:"Théorème fondamental de l'analyse : ∫ₐᵇ f(x) dx = F(b) - F(a) où F est une primitive de f." },

    // === LOGARITHME ET EXPONENTIELLE ===
    { id:33, theme:"Log et Exp", question:"ln(a×b) est égal à :", options:["ln(a) × ln(b)","ln(a) + ln(b)","ln(a) - ln(b)","ln(a+b)"], correctAnswer:1, explanation:"Propriété fondamentale : ln(ab) = ln(a) + ln(b). Le logarithme transforme les produits en sommes." },
    { id:34, theme:"Log et Exp", question:"ln(aⁿ) est égal à :", options:["n + ln(a)","ln(a)ⁿ","n × ln(a)","ln(n×a)"], correctAnswer:2, explanation:"ln(aⁿ) = n × ln(a). Le logarithme descend l'exposant en facteur." },
    { id:35, theme:"Log et Exp", question:"e^(ln(x)) est égal à :", options:["ln(x)","1","x","e×x"], correctAnswer:2, explanation:"e^(ln x) = x par définition (e et ln sont des fonctions réciproques l'une de l'autre)." },
    { id:36, theme:"Log et Exp", question:"ln(e) est égal à :", options:["0","e","1","e-1"], correctAnswer:2, explanation:"ln(e) = 1 par définition. De même ln(1) = 0." },
    { id:37, theme:"Log et Exp", question:"eᵃ × eᵇ est égal à :", options:["eᵃ⁺ᵇ","eᵃˣᵇ","e²⁽ᵃ⁺ᵇ⁾","eᵃ + eᵇ"], correctAnswer:0, explanation:"eᵃ × eᵇ = eᵃ⁺ᵇ. Les exponentielles transforment les sommes en produits (propriété réciproque du ln)." },
    { id:38, theme:"Log et Exp", question:"La fonction ln est définie sur :", options:["ℝ","[-1, +∞[","ℝ\\{0}","]0, +∞["], correctAnswer:3, explanation:"ln est définie uniquement pour x > 0, donc sur ]0, +∞[." },
    { id:39, theme:"Log et Exp", question:"ln(a/b) est égal à :", options:["ln(a) / ln(b)","ln(a) × ln(b)","ln(a) - ln(b)","ln(a) + ln(b)"], correctAnswer:2, explanation:"ln(a/b) = ln(a) - ln(b). Le logarithme transforme les quotients en différences." },
    { id:40, theme:"Log et Exp", question:"La solution de l'équation eˣ = 5 est :", options:["x = 5","x = ln(5)","x = e⁵","x = log(5)"], correctAnswer:1, explanation:"eˣ = 5 ⟺ x = ln(5) (en prenant le logarithme des deux membres)." },

    // === PROBABILITÉS ===
    { id:41, theme:"Probabilités", question:"Si A et B sont deux événements indépendants, alors P(A∩B) est égale à :", options:["P(A) + P(B)","P(A) × P(B)","P(A|B)","P(A) + P(B) - P(A∪B)"], correctAnswer:1, explanation:"Indépendance : P(A∩B) = P(A) × P(B). C'est la définition de l'indépendance probabiliste." },
    { id:42, theme:"Probabilités", question:"La formule des probabilités totales pour P(B) est :", options:["P(B) = P(A)×P(B|A)","P(B) = P(B|A) + P(B|Ā)","P(B) = P(A)×P(B|A) + P(Ā)×P(B|Ā)","P(B) = P(A∩B)/P(A)"], correctAnswer:2, explanation:"Formule des probabilités totales : P(B) = P(A)×P(B|A) + P(Ā)×P(B|Ā) pour une partition {A, Ā}." },
    { id:43, theme:"Probabilités", question:"P(A|B) (probabilité de A sachant B) est égale à :", options:["P(A)×P(B)","P(A∩B) / P(B)","P(B∩A) / P(A)","P(A) / P(B)"], correctAnswer:1, explanation:"Probabilité conditionnelle : P(A|B) = P(A∩B) / P(B), pour P(B) > 0." },
    { id:44, theme:"Probabilités", question:"Pour une loi binomiale B(n, p), l'espérance est :", options:["n×p×(1-p)","n×(1-p)","n×p","√(n×p×(1-p))"], correctAnswer:2, explanation:"L'espérance de B(n, p) est E(X) = n×p. La variance est V(X) = n×p×(1-p)." },
    { id:45, theme:"Probabilités", question:"P(X = k) pour une loi binomiale B(n, p) est égale à :", options:["pᵏ × (1-p)ⁿ⁻ᵏ","C(n,k) × pᵏ × (1-p)ⁿ⁻ᵏ","n! / k! × pᵏ","C(n,k) × pⁿ × (1-p)ᵏ"], correctAnswer:1, explanation:"P(X=k) = C(n,k) × pᵏ × (1-p)ⁿ⁻ᵏ où C(n,k) = n!/(k!(n-k)!) est le coefficient binomial." },
    { id:46, theme:"Probabilités", question:"L'écart-type σ d'une variable aléatoire X est :", options:["E(X)","V(X)","√V(X)","V(X)²"], correctAnswer:2, explanation:"L'écart-type est la racine carrée de la variance : σ = √V(X). Il a la même unité que X." },
    { id:47, theme:"Probabilités", question:"P(A∪B) est égale à :", options:["P(A) + P(B)","P(A) × P(B)","P(A) + P(B) - P(A∩B)","P(A) - P(B)"], correctAnswer:2, explanation:"Formule d'inclusion-exclusion : P(A∪B) = P(A) + P(B) - P(A∩B)." },
    { id:48, theme:"Probabilités", question:"La variance de X est définie par :", options:["E(X)","E(X²) - (E(X))²","(E(X))²","E(X - E(X))"], correctAnswer:1, explanation:"V(X) = E(X²) - (E(X))² = E((X-E(X))²). Formule de König-Huygens." },

    // === LOIS CONTINUES ===
    { id:49, theme:"Lois continues", question:"Pour une loi uniforme sur [a, b], P(X ≤ x) est :", options:["1/(b-a)","(x-a)/(b-a)","(b-x)/(b-a)","1"], correctAnswer:1, explanation:"Pour la loi uniforme U([a,b]) : F(x) = (x-a)/(b-a) pour x ∈ [a,b]." },
    { id:50, theme:"Lois continues", question:"Pour une loi normale N(μ, σ²), l'espérance est μ et la variance est :", options:["μ","σ","σ²","√σ"], correctAnswer:2, explanation:"Pour N(μ, σ²) : E(X) = μ et V(X) = σ². L'écart-type est σ." },
    { id:51, theme:"Lois continues", question:"Pour la loi normale centrée réduite N(0,1), environ 95% des valeurs se trouvent dans :", options:["[-1, 1]","[-2, 2]","[-3, 3]","[-1.5, 1.5]"], correctAnswer:1, explanation:"Règle des 2σ : P(-2 ≤ Z ≤ 2) ≈ 95,4%. Règle des 3σ : P(-3 ≤ Z ≤ 3) ≈ 99,7%." },
    { id:52, theme:"Lois continues", question:"Si X suit N(μ, σ²), la variable centrée réduite Z = ... suit N(0,1) :", options:["Z = X - μ","Z = (X - μ)/σ","Z = X/σ","Z = (X - σ)/μ"], correctAnswer:1, explanation:"Centrage-réduction : Z = (X - μ)/σ. On soustrait la moyenne et on divise par l'écart-type." },
    { id:53, theme:"Lois continues", question:"L'intervalle de fluctuation au niveau 95% pour une fréquence observée est centré sur :", options:["0","0.5","p (la probabilité théorique)","La fréquence observée"], correctAnswer:2, explanation:"L'intervalle de fluctuation est centré sur p, la proportion théorique : [p - 1/√n ; p + 1/√n] approximativement." },

    // === GÉOMÉTRIE DANS L'ESPACE ===
    { id:54, theme:"Géométrie", question:"Deux droites sont parallèles si et seulement si leurs vecteurs directeurs sont :", options:["Orthogonaux","Colinéaires","Égaux","De même norme"], correctAnswer:1, explanation:"Deux droites sont parallèles ⟺ leurs vecteurs directeurs sont colinéaires (l'un est multiple de l'autre)." },
    { id:55, theme:"Géométrie", question:"Un vecteur normal à un plan est un vecteur qui est :", options:["Contenu dans le plan","Parallèle au plan","Perpendiculaire à tout vecteur du plan","Colinéaire à tout vecteur du plan"], correctAnswer:2, explanation:"Un vecteur normal est perpendiculaire (orthogonal) à tout vecteur directeur du plan." },
    { id:56, theme:"Géométrie", question:"L'équation cartésienne d'un plan de vecteur normal (a, b, c) passant par M₀(x₀, y₀, z₀) est :", options:["ax + by + cz = 0","a(x-x₀) + b(y-y₀) + c(z-z₀) = 0","ax₀ + by₀ + cz₀ = 0","a/x + b/y + c/z = 0"], correctAnswer:1, explanation:"Équation d'un plan : a(x-x₀) + b(y-y₀) + c(z-z₀) = 0, soit ax + by + cz = ax₀ + by₀ + cz₀." },
    { id:57, theme:"Géométrie", question:"Le produit scalaire AB⃗ · AC⃗ est égal à :", options:["||AB|| × ||AC||","||AB|| × ||AC|| × cos(∠BAC)","||AB|| × ||AC|| × sin(∠BAC)","||AB|| + ||AC||"], correctAnswer:1, explanation:"Produit scalaire : u⃗·v⃗ = ||u⃗|| × ||v⃗|| × cos(θ) où θ est l'angle entre les vecteurs." },
    { id:58, theme:"Géométrie", question:"Deux vecteurs sont orthogonaux si et seulement si leur produit scalaire est :", options:["1","-1","0","||u||×||v||"], correctAnswer:2, explanation:"u⃗⊥v⃗ ⟺ u⃗·v⃗ = 0. Le cosinus de 90° est 0, donc le produit scalaire est nul." },
    { id:59, theme:"Géométrie", question:"La distance du point M(x₀,y₀,z₀) au plan ax+by+cz+d=0 est :", options:["|ax₀+by₀+cz₀|","(ax₀+by₀+cz₀+d)/√(a²+b²+c²)","|ax₀+by₀+cz₀+d| / √(a²+b²+c²)","√(a²+b²+c²)"], correctAnswer:2, explanation:"Distance point-plan : d = |ax₀+by₀+cz₀+d| / √(a²+b²+c²)." },
    { id:60, theme:"Géométrie", question:"En coordonnées, le produit scalaire u⃗(a,b,c)·v⃗(d,e,f) est :", options:["a²+b²+c²","ad+be+cf","(a+d)(b+e)(c+f)","a/d + b/e + c/f"], correctAnswer:1, explanation:"Produit scalaire analytique : u⃗·v⃗ = ad + be + cf (somme des produits des coordonnées)." },

    // === NOMBRES COMPLEXES ===
    { id:61, theme:"Complexes", question:"Le module de z = a + bi est :", options:["a + b","|a| + |b|","√(a² + b²)","a² + b²"], correctAnswer:2, explanation:"Module : |z| = √(a² + b²) = √(z×z̄) où z̄ = a - bi est le conjugué de z." },
    { id:62, theme:"Complexes", question:"i² est égal à :", options:["1","i","-1","-i"], correctAnswer:2, explanation:"Par définition, i est tel que i² = -1. C'est la définition du nombre imaginaire i." },
    { id:63, theme:"Complexes", question:"La forme trigonométrique de z = |z|(cos θ + i sin θ) s'écrit aussi :", options:["|z| × e^θ","e^(i|z|)","|z| × e^(iθ)","e^(|z|θ)"], correctAnswer:2, explanation:"Forme exponentielle de Euler : z = |z|e^(iθ) = |z|(cos θ + i sin θ), où θ = arg(z)." },
    { id:64, theme:"Complexes", question:"Le conjugué de z = a + bi est :", options:["a - bi","-a + bi","-a - bi","a + bi"], correctAnswer:0, explanation:"Le conjugué de z = a + bi est z̄ = a - bi. On change le signe de la partie imaginaire." },
    { id:65, theme:"Complexes", question:"z × z̄ (z multiplié par son conjugué) est égal à :", options:["2a","2bi","a² - b²","a² + b²"], correctAnswer:3, explanation:"z × z̄ = (a+bi)(a-bi) = a² - (bi)² = a² + b² = |z|². Toujours réel et positif." },
    { id:66, theme:"Complexes", question:"Pour z₁ et z₂ complexes, |z₁ × z₂| est égal à :", options:["|z₁| + |z₂|","|z₁| × |z₂|","|z₁|² × |z₂|²","√(|z₁| × |z₂|)"], correctAnswer:1, explanation:"|z₁ × z₂| = |z₁| × |z₂|. Le module d'un produit est le produit des modules." },
    { id:67, theme:"Complexes", question:"L'argument de z₁ × z₂ est :", options:["arg(z₁) × arg(z₂)","arg(z₁) - arg(z₂)","arg(z₁) + arg(z₂) [mod 2π]","arg(z₁) / arg(z₂)"], correctAnswer:2, explanation:"arg(z₁ × z₂) = arg(z₁) + arg(z₂) [modulo 2π]. L'argument d'un produit est la somme des arguments." },
    { id:68, theme:"Complexes", question:"La formule d'Euler donne e^(iπ) égal à :", options:["i","1","-1","0"], correctAnswer:2, explanation:"e^(iπ) = cos(π) + i sin(π) = -1 + 0 = -1. Formule d'Euler : e^(iπ) + 1 = 0." },

    { id:70, theme:"Arithmétique", question:"a est divisible par b si et seulement si :", options:["a = b + k pour un entier k","b = a + k pour un entier k","a = b × k pour un entier k","a × b > 0"], correctAnswer:2, explanation:"a est divisible par b (ou b divise a) s'il existe un entier k tel que a = b × k. On note b | a." },

  let selectedQuestions = [], currentIndex = 0, score = 0;

  function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function startQuiz() {
    selectedQuestions = shuffle(ALL_QUESTIONS).slice(0, 20);
    currentIndex = 0; score = 0;
    document.getElementById('start-screen').style.display = 'none';
    document.getElementById('result-screen').style.display = 'none';
    document.getElementById('quiz-screen').style.display = 'block';
    showQuestion();
  }

  function showQuestion() {
    const q = selectedQuestions[currentIndex];
    const total = selectedQuestions.length;
    document.getElementById('q-counter').textContent = `Question ${currentIndex + 1} / ${total}`;
    document.getElementById('score-live').textContent = `Score : ${score}`;
    document.getElementById('progress-fill').style.width = `${(currentIndex / total) * 100}%`;
    document.getElementById('q-theme').textContent = q.theme;
    document.getElementById('q-num').textContent = `Question ${currentIndex + 1}`;
    document.getElementById('q-text').textContent = q.question;
    document.getElementById('explanation').classList.remove('show');
    document.getElementById('next-btn').style.display = 'none';

    const optionsEl = document.getElementById('options');
    optionsEl.innerHTML = '';
    q.options.forEach((opt, i) => {
      const btn = document.createElement('button');
      btn.className = 'option-btn';
      btn.textContent = opt;
      btn.onclick = () => selectAnswer(i, q);
      optionsEl.appendChild(btn);
    });
  }

  function selectAnswer(index, q) {
    const buttons = document.querySelectorAll('.option-btn');
    buttons.forEach(b => b.disabled = true);
    buttons[q.correctAnswer].classList.add('correct');
    if (index !== q.correctAnswer) buttons[index].classList.add('wrong');
    else score++;
    const exp = document.getElementById('explanation');
    exp.textContent = q.explanation;
    exp.classList.add('show');
    document.getElementById('score-live').textContent = `Score : ${score}`;
    document.getElementById('next-btn').style.display = 'inline-block';
    document.getElementById('next-btn').textContent = currentIndex + 1 < selectedQuestions.length ? 'Question suivante →' : 'Voir le résultat →';
  }

  function nextQuestion() {
    currentIndex++;
    if (currentIndex < selectedQuestions.length) showQuestion();
    else showResult();
  }

  function showResult() {
    document.getElementById('quiz-screen').style.display = 'none';
    document.getElementById('result-screen').style.display = 'block';
    document.getElementById('progress-fill').style.width = '100%';
    document.getElementById('final-score').textContent = score;
    document.getElementById('score-detail').textContent = `${score} bonnes réponses sur ${selectedQuestions.length} questions`;
    const msgs = ["Il faut reprendre les bases depuis le début. Les fiches de cours sont là pour vous aider !", "Des lacunes importantes — consultez les fiches de cours par thème.", "Pas mal ! Mais certains chapitres nécessitent encore du travail.", "Bien ! Quelques formules à consolider.", "Très bien ! Maîtrise solide du programme.", "Excellent ! Vous êtes prêt pour le bac !"];
    const idx = score >= 18 ? 5 : score >= 16 ? 4 : score >= 12 ? 3 : score >= 8 ? 2 : score >= 5 ? 1 : 0;
    document.getElementById('score-msg').textContent = msgs[idx];
  }
  </script>
